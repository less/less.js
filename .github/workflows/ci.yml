# Github actions workflow name
name: CI

# Triggers the workflow on push or pull request events
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

jobs:
  test:
    name: 'Tests on ${{matrix.os}} with Node "${{matrix.node}}"'
    strategy:
      fail-fast: false
      matrix:
        # Test all mainstream operating systems
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['current']
        include:
          - os: ubuntu-latest
            node: 'lts/*'
          - os: ubuntu-latest
            node: 'lts/-1'
          - os: ubuntu-latest
            node: 'lts/-2'
          - os: ubuntu-latest
            node: 'lts/-3'

    runs-on: ${{ matrix.os }}
    # This has copy/paste steps and should be refactored using DRY
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Print put node & npm version
        run: node --version && pnpm --version
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ matrix.node }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install chromium
        run: pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5
      - name: Run node tests (ESM + CJS)
        run: pnpm run test:node
